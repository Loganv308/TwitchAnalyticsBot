<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TwitchAnalyticsBot</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0e0e10;
    --surface:   #18181b;
    --surface2:  #1f1f23;
    --border:    #2a2a2f;
    --purple:    #9147ff;
    --purple-d:  #6318c0;
    --green:     #00c980;
    --red:       #eb4545;
    --text:      #efeff1;
    --muted:     #848494;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.5; min-height: 100vh; }

  /* ── Layout ── */
  .shell { display: grid; grid-template-columns: 220px 1fr; grid-template-rows: 52px 1fr; min-height: 100vh; }

  /* ── Topbar ── */
  header {
    grid-column: 1 / -1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
  }
  .logo { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 13px; font-weight: 500; }
  .logo svg { color: var(--purple); }
  .header-right { display: flex; align-items: center; gap: 16px; font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  #clock { color: var(--muted); }

  /* ── Sidebar ── */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 16px 0;
    overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .sidebar-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .1em; padding: 0 16px 8px; text-transform: uppercase; }
  .channel-btn {
    width: 100%; text-align: left; background: none; border: none; cursor: pointer;
    padding: 9px 16px; display: flex; align-items: center; gap: 10px;
    color: var(--muted); font-family: var(--sans); font-size: 13px;
    transition: background .1s, color .1s;
    border-left: 2px solid transparent;
  }
  .channel-btn:hover { background: var(--surface2); color: var(--text); }
  .channel-btn.active { background: var(--surface2); color: var(--text); border-left-color: var(--purple); }
  .ch-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: var(--border); }
  .ch-dot.live { background: var(--green); }
  .ch-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ch-viewers { font-family: var(--mono); font-size: 11px; color: var(--muted); }

  /* ── Sidebar search ── */
  .sidebar-search {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    margin-top: auto;
    overflow: visible;
  }
  .sidebar-search-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }
  .search-input-wrap {
    display: flex;
    gap: 6px;
    align-items: center;
    width: 100%;
  }
  .search-input {
    flex: 1;
    min-width: 0;
    width: 0; /* ✅ forces input to shrink and give space to button */
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 7px 10px; color: var(--text);
    font-family: var(--mono); font-size: 12px; outline: none;
    transition: border-color .15s;
  }
  .search-input:focus { border-color: var(--purple); }
  .search-input::placeholder { color: var(--muted); }
  .search-btn {
    background: var(--purple); border: none; border-radius: 4px;
    padding: 7px 12px; color: #fff; cursor: pointer; font-family: var(--mono);
    font-size: 11px; font-weight: 500; transition: background .15s;
    flex-shrink: 0;
    width: 36px; /* ✅ fixed width so it never gets squeezed */
  }
  .search-btn:hover { background: var(--purple-d); }
  .search-btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ── Main ── */
  main { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }

  /* ── Stream banner ── */
  .stream-banner {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
  }
  .banner-left { display: flex; align-items: center; gap: 12px; }
  .live-pill { font-family: var(--mono); font-size: 10px; font-weight: 500; background: var(--red); color: #fff; padding: 3px 8px; border-radius: 3px; letter-spacing: .08em; }
  .offline-pill { font-family: var(--mono); font-size: 10px; background: var(--border); color: var(--muted); padding: 3px 8px; border-radius: 3px; }
  .stream-title { font-size: 14px; font-weight: 500; color: var(--text); }
  .stream-game { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .banner-right { display: flex; gap: 24px; }
  .banner-stat { text-align: right; }
  .banner-stat-val { font-family: var(--mono); font-size: 20px; font-weight: 500; color: var(--text); }
  .banner-stat-label { font-size: 11px; color: var(--muted); margin-top: 1px; }

  /* ── Metric cards ── */
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; }
  .metric-label { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-bottom: 4px; }
  .metric-val { font-family: var(--mono); font-size: 22px; font-weight: 500; }
  .metric-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* ── Two-col panel row ── */
  .panel-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .panel-row.wide { grid-template-columns: 2fr 1fr; }

  /* ── Panel ── */
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; display: flex; flex-direction: column; overflow: hidden; }
  .panel-head { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .panel-title { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; }
  .panel-body { padding: 14px 16px; flex: 1; }
  .chart-wrap { position: relative; width: 100%; height: 200px; padding: 12px 16px; }

  /* ── Chat feed ── */
  .chat-feed { display: flex; flex-direction: column; gap: 0; max-height: 260px; overflow-y: auto; }
  .chat-row { display: flex; gap: 8px; align-items: baseline; padding: 5px 16px; border-bottom: 1px solid var(--border); }
  .chat-row:last-child { border-bottom: none; }
  .chat-ts { font-family: var(--mono); font-size: 10px; color: var(--muted); flex-shrink: 0; width: 54px; }
  .chat-user { font-size: 12px; font-weight: 500; flex-shrink: 0; max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sub-tag { font-family: var(--mono); font-size: 9px; background: #9147ff33; color: var(--purple); padding: 1px 4px; border-radius: 2px; margin-left: 3px; vertical-align: middle; }
  .chat-msg { font-size: 13px; color: #c8c8d4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .empty { color: var(--muted); font-size: 13px; padding: 20px 16px; font-family: var(--mono); }

  /* ── Top chatters ── */
  .chatter-list { display: flex; flex-direction: column; gap: 6px; }
  .chatter-row { display: flex; align-items: center; gap: 10px; }
  .chatter-rank { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 18px; text-align: right; flex-shrink: 0; }
  .chatter-bar-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .chatter-bar { height: 100%; background: var(--purple); border-radius: 2px; }
  .chatter-name { font-size: 13px; width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
  .chatter-count { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 44px; text-align: right; flex-shrink: 0; }

  /* ── Info table ── */
  .info-table { width: 100%; border-collapse: collapse; }
  .info-table td { padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .info-table tr:last-child td { border-bottom: none; }
  .info-table td:first-child { color: var(--muted); font-size: 12px; width: 40%; }
  .info-table td:last-child { color: var(--text); font-family: var(--mono); font-size: 12px; text-align: right; }

  /* ── Search results overlay ── */
  .search-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .search-overlay.open { opacity: 1; pointer-events: all; }
  .search-modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    width: 680px; max-width: 95vw; max-height: 80vh;
    display: flex; flex-direction: column; overflow: hidden;
    transform: translateY(8px); transition: transform .2s;
  }
  .search-overlay.open .search-modal { transform: translateY(0); }
  .search-modal-head {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-shrink: 0;
  }
  .search-modal-title { font-family: var(--mono); font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .search-modal-user { font-size: 15px; font-weight: 500; color: var(--purple); }
  .search-close-btn {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 18px; line-height: 1; padding: 2px 6px; border-radius: 3px;
    transition: color .1s, background .1s;
  }
  .search-close-btn:hover { color: var(--text); background: var(--surface2); }

  /* ── Search stats strip ── */
  .search-stats {
    display: grid; grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .search-stat { padding: 12px 16px; border-right: 1px solid var(--border); }
  .search-stat:last-child { border-right: none; }
  .search-stat-label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .search-stat-val { font-family: var(--mono); font-size: 18px; font-weight: 500; }

  /* ── Search message list ── */
  .search-messages { overflow-y: auto; flex: 1; }
  .search-empty { color: var(--muted); font-family: var(--mono); font-size: 12px; padding: 32px; text-align: center; }
  .search-loading { color: var(--muted); font-family: var(--mono); font-size: 12px; padding: 32px; text-align: center; }

  /* ── Refresh indicator ── */
  .refresh-bar { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
  .refresh-fill { height: 100%; background: var(--purple); border-radius: 1px; transition: width linear; }

  /* ── Error / loading states ── */
  .loading { color: var(--muted); font-family: var(--mono); font-size: 12px; padding: 24px; text-align: center; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="shell">

  <!-- ── Header ── -->
  <header>
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/>
      </svg>
      TwitchAnalyticsBot
    </div>
    <div class="header-right">
      <div class="refresh-bar" style="width:120px;">
        <div class="refresh-fill" id="refreshFill" style="width:100%"></div>
      </div>
      <div class="pulse"></div>
      <span id="clock"></span>
    </div>
  </header>

  <!-- ── Sidebar ── -->
  <aside>
    <div style="padding: 0 16px 8px; display: flex; align-items: center; justify-content: space-between;">
      <span class="sidebar-label" style="padding: 0; margin: 0;">Channels</span>
      <select id="sortSelect" onchange="renderSidebar(allChannels)" style="
        background: var(--surface2); border: 1px solid var(--border); border-radius: 3px;
        color: var(--muted); font-family: var(--mono); font-size: 10px;
        padding: 2px 4px; cursor: pointer; outline: none;
      ">
        <option value="default">Default</option>
        <option value="online">Online first</option>
        <option value="viewers">Viewers</option>
        <option value="messages">Messages</option>
        <option value="name">Name</option>
      </select>
    </div>
    <div id="channelList"><div class="loading">Loading...</div></div>

    <!-- ── User search ── -->
    <div class="sidebar-search">
      <div class="sidebar-search-label">Search User</div>
      <div class="search-input-wrap">
        <input class="search-input" id="searchInput" type="text" placeholder="username..." />
        <button class="search-btn" id="searchBtn" onclick="runSearch()">Go</button>
      </div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main id="mainContent">
    <div class="loading">Select a channel</div>
  </main>

</div>

<!-- ── Search results modal ── -->
<div class="search-overlay" id="searchOverlay" onclick="closeSearch(event)">
  <div class="search-modal">
    <div class="search-modal-head">
      <div>
        <div class="search-modal-title">User lookup — <span id="searchChannel">—</span></div>
        <div class="search-modal-user" id="searchUsername">—</div>
      </div>
      <button class="search-close-btn" onclick="closeSearchModal()">✕</button>
    </div>
    <div class="search-stats">
      <div class="search-stat">
        <div class="search-stat-label">Messages</div>
        <div class="search-stat-val" id="searchTotalMsgs">—</div>
      </div>
      <div class="search-stat">
        <div class="search-stat-label">Subscriber</div>
        <div class="search-stat-val" id="searchIsSub">—</div>
      </div>
      <div class="search-stat">
        <div class="search-stat-label">First seen</div>
        <div class="search-stat-val" id="searchFirstSeen" style="font-size:13px">—</div>
      </div>
      <div class="search-stat">
        <div class="search-stat-label">Last seen</div>
        <div class="search-stat-val" id="searchLastSeen" style="font-size:13px">—</div>
      </div>
    </div>
    <div class="search-messages" id="searchMessages">
      <div class="search-empty">Enter a username to search.</div>
    </div>
  </div>
</div>

<script>
const API     = 'http://localhost:3001/api';
const POLL_MS = 5000;

// ── state ──────────────────────────────────────────────────────────────────
let activeChannel  = null;
let allChannels    = [];
let layoutBuilt    = false;
let mpmChart       = null;
let isPolling      = false;

// ── helpers ────────────────────────────────────────────────────────────────
function fmtNum(n) {
  if (n == null || isNaN(n)) return '—';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000)    return (n / 1000).toFixed(1) + 'K';
  return String(n);
}
function fmtTs(ts) {
  if (!ts) return '—';
  try { return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }); }
  catch { return ts; }
}
function fmtDate(ts) {
  if (!ts) return '—';
  try { return new Date(ts).toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }); }
  catch { return ts; }
}
function hashColor(str) {
  const p = ['#9147ff','#00c980','#ff6b6b','#fbbf24','#38bdf8','#fb923c','#a78bfa'];
  let h = 0;
  for (const c of str) h = (h + c.charCodeAt(0)) % p.length;
  return p[h];
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function setText(id, val) {
  const el = document.getElementById(id);
  if (el && el.textContent !== String(val)) el.textContent = val;
}
function setHtml(id, val) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = val;
}
function getDateKey(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

// ── clock ──────────────────────────────────────────────────────────────────
setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}, 1000);

// ── refresh progress bar ───────────────────────────────────────────────────
let refreshStart = Date.now();
setInterval(() => {
  const pct = Math.max(0, 100 - ((Date.now() - refreshStart) / POLL_MS * 100));
  document.getElementById('refreshFill').style.width = pct + '%';
}, 100);

// ── sidebar ────────────────────────────────────────────────────────────────
async function loadChannels() {
  try {
    const data  = await fetch(`${API}/channels`).then(r => r.json());
    allChannels = data.channels ?? data;
    renderSidebar(allChannels);
    if (!activeChannel && allChannels.length) switchChannel(allChannels[0].cleanChannel);
  } catch (error) {
    console.error(error);
    setHtml('channelList', '<div class="empty">Cannot reach API<br>Is index.ts running?</div>');
  }
}

function renderSidebar(channels) {
  const sort = document.getElementById('sortSelect')?.value || 'default';
  const sorted = [...channels].sort((a, b) => {
    switch (sort) {
      case 'online':
        if (a.online !== b.online) return a.online ? -1 : 1;
        return (b.stream?.viewer_count || 0) - (a.stream?.viewer_count || 0);
      case 'viewers':
        return (b.stream?.viewer_count || 0) - (a.stream?.viewer_count || 0);
      case 'messages':
        return (b.stats?.total_messages || 0) - (a.stats?.total_messages || 0);
      case 'name':
        return a.cleanChannel.localeCompare(b.cleanChannel);
      default:
        return 0;
    }
  });

  setHtml('channelList', sorted.map(ch => `
    <button class="channel-btn ${ch.cleanChannel === activeChannel ? 'active' : ''}"
            onclick="switchChannel('${ch.cleanChannel}')">
      <span class="ch-dot ${ch.online ? 'live' : ''}"></span>
      <span class="ch-name">${ch.cleanChannel}</span>
      <span class="ch-viewers">${ch.online ? fmtNum(ch.stream?.viewer_count) : ''}</span>
    </button>
  `).join(''));
}

function switchChannel(name) {
  if (name === activeChannel && layoutBuilt) return;
  activeChannel = name;
  layoutBuilt   = false;
  seenMessageIds.clear();
  renderSidebar(allChannels);
  refreshStart = Date.now();
  poll(name); // immediate poll on switch
}

// ── search ─────────────────────────────────────────────────────────────────
// Allow pressing Enter in the search box
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') runSearch();
});

let searchRefreshTimer = null;
let lastSearchUsername = null;

async function runSearch() {
  const input    = document.getElementById('searchInput');
  const btn      = document.getElementById('searchBtn');
  const username = input.value.trim();

  if (!username)      return;
  if (!activeChannel) return alert('Select a channel first.');

  lastSearchUsername = username;
  btn.disabled       = true;
  btn.textContent    = '...';

  document.getElementById('searchOverlay').classList.add('open');
  document.getElementById('searchChannel').textContent  = activeChannel;
  document.getElementById('searchUsername').textContent = username;

  await fetchSearchResults(username);

  btn.disabled    = false;
  btn.textContent = 'Go';

  clearInterval(searchRefreshTimer);
  searchRefreshTimer = setInterval(() => {
    if (lastSearchUsername) fetchSearchResults(lastSearchUsername);
  }, 5000);
}

// Extracted so both runSearch and the interval can call it
async function fetchSearchResults(username) {
  try {
    const data  = await fetch(`${API}/channel/${activeChannel}/search?username=${encodeURIComponent(username)}`).then(r => r.json());

    if (data.error) {
      setHtml('searchMessages', `<div class="search-empty">${escHtml(data.error)}</div>`);
      return;
    }

    const stats = data.stats    || {};
    const msgs  = data.messages || [];

    setText('searchTotalMsgs', fmtNum(stats.total_messages || 0));
    setText('searchIsSub',     stats.subscriber_messages > 0 ? 'Yes' : 'No');
    setText('searchFirstSeen', fmtDate(stats.first_seen));
    setText('searchLastSeen',  fmtDate(stats.last_seen));

    const subEl = document.getElementById('searchIsSub');
    if (subEl) subEl.style.color = stats.subscriber_messages > 0 ? 'var(--purple)' : 'var(--muted)';

    if (!msgs.length) {
      setHtml('searchMessages', `<div class="search-empty">No messages found for "${escHtml(username)}" in ${activeChannel}.</div>`);
      return;
    }

    const sorted = [...msgs].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
    let lastDateKey = null;
    const html = sorted.map(m => {
      const dateKey = getDateKey(m.timestamp);
      let header = '';
      if (dateKey !== lastDateKey) {
        lastDateKey = dateKey;
        header = `<div style="padding:8px 16px 6px;font-family:var(--mono);font-size:10px;
          color:var(--purple);letter-spacing:.08em;text-transform:uppercase;
          border-bottom:1px solid var(--border);background:var(--surface2);
          position:sticky;top:0;">${fmtDate(m.timestamp)}</div>`;
      }
      return header + `
        <div class="chat-row">
          <span class="chat-ts">${fmtTs(m.timestamp)}</span>
          <span class="chat-user" style="color:${hashColor(m.username || '')}">${escHtml(m.username || 'anon')}</span>
          ${m.subscriber ? '<span class="sub-tag">sub</span>' : ''}
          <span class="chat-msg" style="white-space:normal;overflow:visible;">${escHtml(m.message || '')}</span>
        </div>`;
    }).join('');

    const container  = document.getElementById('searchMessages');
    const isAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 40;
    container.innerHTML = html;
    if (isAtBottom) container.scrollTop = container.scrollHeight;

  } catch (err) {
    console.error(err);
  }
}

function closeSearchModal() {
  document.getElementById('searchOverlay').classList.remove('open');
  clearInterval(searchRefreshTimer);
  searchRefreshTimer = null;
  lastSearchUsername = null;
}

function closeSearch(e) {
  if (e.target === document.getElementById('searchOverlay')) closeSearchModal();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSearchModal();
});

// ── single poll cycle ──────────────────────────────────────────────────────
const seenMessageIds = new Set();

async function poll(channel) {
  if (isPolling) return; // prevent overlapping polls
  isPolling = true;

  try {
    // Fetch channel data and all stats in parallel
    const [channelRes, messages, mpm, topChatters, subRatio] = await Promise.all([
      fetch(`${API}/channels`).then(r => r.json()),
      fetch(`${API}/channel/${channel}/messages?limit=50`).then(r => r.json()),
      fetch(`${API}/channel/${channel}/stats/mpm`).then(r => r.json()),
      fetch(`${API}/channel/${channel}/stats/top-chatters`).then(r => r.json()),
      fetch(`${API}/channel/${channel}/stats/subscriber-ratio`).then(r => r.json()),
    ]);

    // Update allChannels so sidebar live status stays fresh
    allChannels = channelRes.channels ?? channelRes;
    renderSidebar(allChannels);

    // Get the latest data for active channel
    const chData = allChannels.find(c => c.cleanChannel === channel) || {};

    if (!layoutBuilt) {
      buildLayout(channel, chData);
      layoutBuilt = true;
    }

    patchData(channel, chData, messages, mpm, topChatters, subRatio);

  } catch (e) {
    console.error('Poll error:', e);
    if (!layoutBuilt) {
      setHtml('mainContent', `<div class="loading">Error loading ${channel}</div>`);
    }
  } finally {
    isPolling = false;
  }
}

// ── patchData ──────────────────────────────────────────────────────────────
function patchData(channel, chData, messages, mpm, topChatters, subRatio) {
  const stream      = chData.stream || {};
  const stats       = chData.stats  || {};
  const isLive      = chData.online;
  const totalMsgs   = stats.total_messages      || 0;
  const uniqueUsers = stats.unique_chatters      || 0;
  const subMsgs     = stats.sub_messages         || 0;
  const subPct      = totalMsgs ? Math.round(subMsgs / totalMsgs * 100) : 0;
  const curMpm      = mpm.length
    ? Math.round(mpm.reduce((sum, r) => sum + r.count, 0) / mpm.length)
    : '—';

  // Live pill
  const pill = document.getElementById('livePill');
  if (pill) {
    pill.textContent = isLive ? 'LIVE' : 'OFFLINE';
    pill.className   = isLive ? 'live-pill' : 'offline-pill';
  }

  // Banner
  setText('streamTitle',   stream.title      || channel);
  setText('streamGame',    stream.game_name  || '—');
  setText('bannerViewers', isLive ? fmtNum(stream.viewer_count) : '—');
  setText('bannerMsgs',    fmtNum(totalMsgs));

  // Metrics
  setText('metTotalMsgs', fmtNum(totalMsgs));
  setText('metUnique',    fmtNum(uniqueUsers));
  setText('metSubMsgs',   fmtNum(subMsgs));
  setText('metSubPct',    subPct + '% of all chat');
  setText('metMpm',       curMpm);

  // Stream info table
  setText('infoGame',    stream.game_name || '—');
  setText('infoId',      stream.id        || '—');
  setText('infoUserId',  stream.user_id   || '—');
  setText('infoStarted', fmtTs(stream.started_at));
  setText('infoSubPct',  subPct + '%');

  // Chart
  if (mpmChart) {
    mpmChart.data.labels           = mpm.map(r => r.minute ? r.minute.slice(11, 16) : '');
    mpmChart.data.datasets[0].data = mpm.map(r => r.count);
    mpmChart.update('none');
  }

  // Chat feed
  patchChatFeed(messages);

  // Top chatters
  const max = topChatters[0]?.message_count || 1;
  setHtml('chatterList', topChatters.length
    ? topChatters.map((c, i) => `
        <div class="chatter-row">
          <span class="chatter-rank">${i + 1}</span>
          <span class="chatter-name" style="color:${hashColor(c.username)}">${escHtml(c.username)}</span>
          <div class="chatter-bar-wrap">
            <div class="chatter-bar" style="width:${Math.round(c.message_count / max * 100)}%"></div>
          </div>
          <span class="chatter-count">${fmtNum(c.message_count)}</span>
        </div>`).join('')
    : '<div class="empty">No data yet.</div>'
  );
}


// ── Chat feed ──────────────────────────────────────────────────────────────

function patchChatFeed(messages) {
  const feed = document.getElementById('chatFeed');
  if (!feed) return;

  if (!Array.isArray(messages) || !messages.length) {
    if (!seenMessageIds.size) feed.innerHTML = '<div class="empty">No messages in DB yet.</div>';
    return;
  }

  const empty = feed.querySelector('.empty');
  if (empty) empty.remove();

  const newRows = messages.filter(m => !seenMessageIds.has(m.message_id));
  newRows.forEach(m => {
    seenMessageIds.add(m.message_id);
    const row = document.createElement('div');
    row.className = 'chat-row';
    row.innerHTML = `
      <span class="chat-ts">${fmtTs(m.timestamp)}</span>
      <span class="chat-user" style="color:${hashColor(m.username || '')}">${escHtml(m.username || 'anon')}</span>
      ${m.subscriber ? '<span class="sub-tag">sub</span>' : ''}
      <span class="chat-msg">${escHtml(m.message || '')}</span>`;
    feed.prepend(row);
  });

  while (feed.children.length > 60) feed.removeChild(feed.lastChild);
}
